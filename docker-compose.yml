services:
  postgres:
    image: postgres:15-alpine
    container_name: solmate-postgres
    restart: always
    ports:
      - "${POSTGRES_PORT:?}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      POSTGRES_DB: ${POSTGRES_DB:?}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - solmate-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: solmate-pgadmin
    restart: always
    ports:
      - "${PGADMIN_PORT:?}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:?}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:?}
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - solmate-network

  redis:
    image: redis:7-alpine
    container_name: solmate-redis
    restart: always
    command: redis-server --appendonly yes --appendfsync everysec
    ports:
      - "${REDIS_PORT:?}:6379"
    volumes:
      - redis-data:/data
    networks:
      - solmate-network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: solmate-redis-ui
    restart: always
    ports:
      - "${REDIS_UI_PORT:?}:8081"
    environment:
      REDIS_HOSTS: "local:redis:6379"
    depends_on:
      - redis
    networks:
      - solmate-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: solmate-zookeeper
    restart: always
    ports:
      - "${ZOOKEEPER_PORT:?}:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
      - zookeeper-secrets:/etc/zookeeper/secrets
    networks:
      - solmate-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: solmate-kafka
    restart: always
    ports:
      - "${KAFKA_PORT:?}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:${KAFKA_INTERNAL_PORT:?},PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:${KAFKA_INTERNAL_PORT:?},PLAINTEXT_HOST://localhost:${KAFKA_PORT:?}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka-data:/var/lib/kafka/data
      - kafka-secrets:/etc/kafka/secrets
    depends_on:
      - zookeeper
    networks:
      - solmate-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: solmate-kafka-ui
    restart: always
    ports:
      - "${KAFKA_UI_PORT:?}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:${KAFKA_INTERNAL_PORT:?}
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
    networks:
      - solmate-network

volumes:
  postgres-data:
    name: solmate-postgres-data
  pgadmin-data:
    name: solmate-pgadmin-data
  redis-data:
    name: solmate-redis-data
  zookeeper-data:
    name: solmate-zookeeper-data
  zookeeper-log:
    name: solmate-zookeeper-log
  zookeeper-secrets:
    name: solmate-zookeeper-secrets
  kafka-data:
    name: solmate-kafka-data
  kafka-secrets:
    name: solmate-kafka-secrets

networks:
  solmate-network:
    name: solmate-network
    driver: bridge
